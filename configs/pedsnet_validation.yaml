# Template for future PEDSnet validation.
#
# Confirmed after PEDSnet refresh:
# - CP_PEDSNET.OMOP_CONDITION_OCCURRENCE is available.
# - CP_PEDSNET.OMOP_PATIENT_MAPPING contains PEDSnet PERSON_ID, PAT_ID, and MRN.
# - condition_source_value is descriptive text; ICD mapping uses
#   condition_source_concept_id -> REHAB.CONCEPT.concept_code/vocabulary_id.
#
# Do not rely on direct person_id overlap with REHAB. The schemas use different ETLs.

project_root: ../..
env_path: .env

random_seed: 0

sources:
  cohort_table: CP_PEDSNET.OMOP_PERSON
  visits_table: CP_PEDSNET.OMOP_VISIT_OCCURRENCE
  observations_table: CP_PEDSNET.OMOP_OBSERVATION
  deaths_table: CP_PEDSNET.OMOP_DEATH
  diagnosis_table: CP_PEDSNET.OMOP_CONDITION_OCCURRENCE
  concept_table: REHAB.CONCEPT
  diagnosis_mode: condition_occurrence
  diagnosis_distinct_patient_code: true
  minimum_diagnosis_patients: 0

crosswalk:
  status: confirmed_table_available
  pedsnet_table: CP_PEDSNET.OMOP_PATIENT_MAPPING
  pedsnet_person_col: PERSON_ID
  pedsnet_mrn_col: MRN
  rehab_candidate_tables:
    - REHAB.TBL_REHAB_PERSON_MAPPING
    - REHAB.PERSON_ID_CROSSWALK
  note: MRN-based bridge is available for auditing; clustering should use PEDSnet person_id internally.

extraction:
  visits_mode: summary

feature_matrix:
  min_patients: 4
  feature_prefix: phe_
  exclude_phecodes:
    - "343.0"
    - "333.4"

cohort_filters:
  require_gmfcs: true
  min_visits: 3

clustering:
  preprocess_method: scanpy_log1p
  normalize_total_target: 10000
  pca_n_components: 50
  pca_svd_solver: arpack
  neighbors_n_pcs: 15
  n_neighbors: 30
  graph_method: umap
  leiden_n_iterations: -1
  target_clusters: 5
  discovery_min_clusters: 3
  discovery_max_clusters: 10
  resolution_grid:
    - 0.50

paths:
  phecode_dir: data/external/phecode
  raw_dir: data/raw/pedsnet_validation
  processed_dir: data/processed/pedsnet_validation
  run_dir: outputs/runs/pedsnet_validation
  report_dir: outputs/reports/pedsnet_validation
  baseline_results_dir: misc/CP_subcluster_onedrive/results
