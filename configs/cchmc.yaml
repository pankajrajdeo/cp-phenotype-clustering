project_root: ../..
env_path: .env

random_seed: 0

oracle:
  cohort_schema: CP_PEDSNET

sources:
  # Strict CCHMC PEDSnet profile.
  # Uses the refreshed PEDSnet condition table and source concept IDs for ICD mapping.
  # Direct person_id joins to REHAB are invalid because the schemas use different ETLs;
  # use OMOP_PATIENT_MAPPING when cross-source alignment is required.
  cohort_table: CP_PEDSNET.OMOP_PERSON
  visits_table: CP_PEDSNET.OMOP_VISIT_OCCURRENCE
  observations_table: CP_PEDSNET.OMOP_OBSERVATION
  deaths_table: CP_PEDSNET.OMOP_DEATH
  diagnosis_table: CP_PEDSNET.OMOP_CONDITION_OCCURRENCE
  concept_table: REHAB.CONCEPT
  diagnosis_mode: condition_occurrence
  diagnosis_distinct_patient_code: true
  minimum_diagnosis_patients: 0

gmfcs:
  source_patterns:
    - GMFCS
  preferred_sources:
    - GMFCS - E&R Level
    - GMFCS Status
    - GMFCS Level
    - (Row Changed 11/18/2011) GMFCS

extraction:
  visits_mode: summary

feature_matrix:
  min_patients: 4
  feature_prefix: phe_
  exclude_phecodes:
    - "343.0"  # Infantile cerebral palsy
    - "333.4"  # Torsion dystonia

cohort_filters:
  require_gmfcs: true
  min_visits: 3

clustering:
  preprocess_method: scanpy_log1p
  normalize_total_target: 10000
  pca_n_components: 50
  pca_svd_solver: arpack
  neighbors_n_pcs: 15
  n_neighbors: 30
  graph_method: umap
  leiden_n_iterations: -1
  target_clusters: 5
  discovery_min_clusters: 3
  discovery_max_clusters: 10
  resolution_grid:
    - 0.50

paths:
  phecode_dir: data/external/phecode
  raw_dir: data/raw/cchmc_pedsnet
  processed_dir: data/processed/cchmc_pedsnet
  run_dir: outputs/runs/cchmc_pedsnet
  report_dir: outputs/reports
  baseline_results_dir: misc/CP_subcluster_onedrive/results
